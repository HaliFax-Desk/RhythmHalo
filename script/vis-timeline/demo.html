<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Vis-Timeline Demo</title>
<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    padding: 32px;
    min-height: 100vh;
  }
  h1 { margin-bottom: 8px; }
  h2 { margin-bottom: 24px; font-weight: 400; color: #888; font-size: 16px; }

  .controls { margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
  .controls button, .controls input {
    padding: 8px 16px;
    border: 1px solid #444;
    border-radius: 6px;
    background: #16213e;
    color: #eee;
    font-size: 14px;
    cursor: pointer;
  }
  .controls button:hover { background: #0f3460; }
  .controls input { width: 200px; }

  #visualization {
    width: 100%;
    height: 400px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #0a0a1a;
    overflow: hidden;
  }

  .info {
    margin-top: 16px;
    color: #666;
    font-size: 13px;
    line-height: 1.8;
  }
  .info code {
    background: #16213e;
    padding: 2px 6px;
    border-radius: 4px;
    color: #ff5c28;
  }
</style>
</head>
<body>

<h1>Vis-Timeline 示例</h1>
<h2>交互式时间轴 · 独立构建 (Standalone Build)</h2>

<div class="controls">
  <input id="itemText" placeholder="输入新事件内容..." value="新事件" />
  <button id="addBtn">＋ 添加事件</button>
  <button id="fitBtn">↔ 适配全部</button>
  <button id="nowBtn">📍 跳转到今天</button>
  <button id="zoomInBtn">🔍 放大</button>
  <button id="zoomOutBtn">🔎 缩小</button>
</div>

<div id="visualization"></div>

<div class="info">
  <p>拖拽滚动缩放 | 双击时间轴放大 | 点击选中事件 | 拖拽事件边缘调整范围</p>
  <p>使用 <code>vis-timeline@7.7.3</code> standalone 构建，零外部依赖</p>
</div>

<script>
  var container = document.getElementById('visualization');

  var items = new vis.DataSet([
    { id: 1, content: '项目启动',        start: '2025-01-10' },
    { id: 2, content: '需求评审',        start: '2025-01-20' },
    { id: 3, content: '开发阶段',        start: '2025-02-01', end: '2025-03-15' },
    { id: 4, content: '内测发布',        start: '2025-03-20' },
    { id: 5, content: '公测上线',        start: '2025-04-01' },
    { id: 6, content: '版本迭代 v1.2',   start: '2025-05-10', end: '2025-06-15' },
    { id: 7, content: '性能优化',        start: '2025-05-01', end: '2025-06-01', className: 'orange' },
    { id: 8, content: '用户反馈收集',    start: '2025-04-15', end: '2025-07-01', className: 'green' },
    { id: 9, content: '安全审计',        start: '2025-06-10', className: 'red' },
    { id: 10, content: 'Q3 规划会议',    start: '2025-07-01', type: 'point' }
  ]);

  var options = {
    start: '2025-01-01',
    end:   '2025-08-01',
    stack: true,
    showCurrentTime: true,
    zoomMin: 1000 * 60 * 60 * 24,       // 1 天
    zoomMax: 1000 * 60 * 60 * 24 * 365, // 1 年
    editable: {
      add: true,
      updateTime: true,
      updateGroup: false,
      remove: true
    },
    onAdd: function (item, callback) {
      if (!item.content || !item.content.trim()) {
        item.content = '未命名事件';
      }
      callback(item);
    }
  };

  var timeline = new vis.Timeline(container, items, options);

  var nextId = 100;
  document.getElementById('addBtn').addEventListener('click', function () {
    var text = document.getElementById('itemText').value.trim() || '新事件';
    var now = new Date();
    var startStr = now.toISOString().split('T')[0];
    items.add({ id: nextId++, content: text, start: startStr });
  });

  document.getElementById('fitBtn').addEventListener('click', function () {
    timeline.fit();
  });

  document.getElementById('nowBtn').addEventListener('click', function () {
    timeline.moveTo(new Date());
  });

  document.getElementById('zoomInBtn').addEventListener('click', function () {
    timeline.zoomIn(0.3);
  });

  document.getElementById('zoomOutBtn').addEventListener('click', function () {
    timeline.zoomOut(0.3);
  });
</script>

</body>
</html>
