<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RhythmHalo · Performance</title>
<!-- ElementPlus UI 组件库 -->
<link rel="stylesheet" href="/static/vendor/element-plus.css">
<!-- 项目样式：严格对应 UIdesign/mainpage.svg 的坐标布局 -->
<link rel="stylesheet" href="/static/css/performance.css">
<!-- 时间轴组件 -->
<link rel="stylesheet" href="/static/css/timeline.css">
</head>
<body>

<div id="app">

  <!-- 左右侧边高亮面板 -->
  <div class="side-panel side-panel--left"></div>
  <div class="side-panel side-panel--right"></div>

  <!-- ====== 顶栏 (可上滑收起) ====== -->
  <header class="perf-header top-header" :class="{ 'top-header--hidden': !showBars }">

    <!-- 列1: bpm -->
    <div class="header-cell col-number">
      <span class="big-number">[[ bpm ]]</span>
      <span class="label-bpm">bpm</span>
    </div>

    <!-- 列2: Key -->
    <div class="header-cell col-number">
      <span class="big-number" style="font-family:'PinyonScript',serif;">[[ vttKey ]]</span>
      <span class="label-bpm">Key</span>
    </div>

    <!-- 列3: Dynamic -->
    <div class="header-cell col-number">
      <span class="big-number">[[ vttDynamic ]]</span>
      <span class="label-bpm">Dynamic</span>
    </div>

    <!-- 列4: Effect -->
    <div class="header-cell col-number">
      <span class="big-number" style="font-family:'PinyonScript',serif;font-size:28px;">[[ vttEffect ]]</span>
    </div>
  </header>

  <!-- VTT 加载条 -->
  <div class="vtt-bar" v-show="showBars">
    <input type="file" accept=".vtt" @change="onVttFilePicked" style="display:none" ref="vttFileInput">
    <span class="vtt-label">VTT 记号文件</span>
    <select v-model="vttSelected" @change="onVttSelected" style="flex:1;padding:2px 8px;border:1px solid #dcdfe6;border-radius:4px;font-size:13px;background:#fff;max-width:200px;">
      <option value="">— 未加载 —</option>
      <option v-for="f in vttFileList" :key="f" :value="f">[[ f ]]</option>
    </select>
    <span v-if="vttFileName" style="font-size:12px;color:#67c23a;margin-left:8px;">✓ [[ vttFileName ]]</span>
    <span v-else style="font-size:12px;color:#909399;margin-left:8px;">或选择本地文件加载</span>
    <button @click="$refs.vttFileInput.click()" style="margin-left:8px;padding:2px 12px;border:1px solid #dcdfe6;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;">📁 本地文件</button>
  </div>

  <!-- 主区 -->
  <main class="perf-main" :class="{ 'perf-main--full': !showBars, 'perf-main--progress': progressVisible }">
    <div class="sheet-wrapper" ref="sheetContainer">
      <div v-show="!sheetLoaded" class="sheet-placeholder">加载乐谱中...</div>
    </div>
  </main>

  <!-- 底栏: 时间轴编辑器 -->
  <header class="perf-header bottom-header" :class="{ 'bottom-header--hidden': !showBars }">
    <div class="tl-root">
      <div class="tl-main">
        <div class="tl-main-inner">
          <div class="tl-track-labels" id="trackLabels"></div>
          <div class="tl-timeline-area" id="timelineArea">
            <div class="tl-timeline-inner" id="timelineInner">
              <div class="ruler"><canvas id="rulerCanvas"></canvas></div>
              <div id="tracksContainer"></div>
              <div class="playhead" id="playhead"></div>
              <div class="click-catcher" id="clickCatcher"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 进度条 -->
  <footer class="perf-footer" :class="{ 'perf-footer--active': progressVisible }">
    <div class="footer-progress" :style="{ width: progressPercent + '%' }"></div>
    <span v-if="progressVisible" class="progress-text">[[ progressText ]]</span>
  </footer>

</div>

<!-- Vue 3 运行时 + ElementPlus 全局组件 -->
<script src="/static/vendor/vue.global.prod.js"></script>
<script src="/static/vendor/element-plus.full.js"></script>
<!-- pdf.js: Mozilla 官方 PDF 渲染库 -->
<script src="/static/vendor/pdf.min.js"></script>
<!-- 业务引擎 + Vue 应用 -->
<script src="/static/js/vtt-engine.js"></script>
<script src="/static/js/performance.js"></script>
<!-- 时间轴编辑器 -->
<script src="/static/js/timeline.js"></script>
<script>window.addEventListener('DOMContentLoaded', () => mountPerformanceApp());</script>
<style>.el-select-dropdown{background:#fff!important;border:1px solid #ccc!important}</style>
</body>
</html>
